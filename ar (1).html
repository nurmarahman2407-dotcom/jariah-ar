<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>JARIAH AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; background:#000; }
    #ui {
      position:fixed; bottom:0; left:0; right:0;
      background:rgba(0,0,0,0.9);
      border-top:2px solid #00c853;
      z-index:999; padding:10px 0 16px;
    }
    #mod-info {
      text-align:center; font-size:12px; color:#00c853;
      font-family:Arial; padding:0 16px 8px; font-weight:bold; line-height:1.6;
    }
    #tabs {
      display:flex; gap:6px; overflow-x:auto; padding:0 10px;
      scrollbar-width:none;
    }
    #tabs::-webkit-scrollbar { display:none; }
    .tab {
      flex-shrink:0; padding:7px 14px; border-radius:16px;
      border:1px solid rgba(0,200,83,0.5); background:transparent;
      color:#90EE90; cursor:pointer; font-size:11px;
      font-family:Arial; white-space:nowrap;
    }
    .tab.on { background:#00c853; color:#000; font-weight:bold; }
    #hint {
      position:fixed; top:12px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.8); color:white;
      padding:8px 18px; border-radius:20px;
      font-size:12px; font-family:Arial; z-index:999;
      text-align:center; max-width:90vw;
      border:1px solid rgba(255,255,255,0.2);
    }
    #hint.found { background:rgba(0,120,0,0.9); border-color:#00c853; }
    #home {
      position:fixed; top:12px; right:12px;
      background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.3);
      color:white; width:40px; height:40px; border-radius:50%;
      font-size:18px; cursor:pointer; z-index:999;
      display:flex; align-items:center; justify-content:center;
    }
  </style>
</head>
<body>

<div id="hint">📸 Arahkan kamera ke marker</div>
<button id="home" onclick="location='index.html'">🏠</button>

<a-scene
  vr-mode-ui="enabled:false"
  renderer="logarithmicDepthBuffer:true; precision:medium;"
  arjs="trackingMethod:best; sourceType:webcam; debugUIEnabled:false;
        detectionMode:mono_and_matrix; matrixCodeType:3x3;">

  <!-- ═══════════════════════════════════════
  MODUL 1 — HIRO MARKER
  Sebelum Meninggal Dunia
  ═══════════════════════════════════════ -->
  <a-marker preset="hiro">

    <!-- BG panel besar -->
    <a-plane position="0 0.01 0" rotation="-90 0 0"
             width="2.8" height="2.2"
             color="#0d2318" opacity="0.97">
    </a-plane>

    <!-- Header -->
    <a-plane position="0 0.02 0.85" rotation="-90 0 0"
             width="2.8" height="0.35" color="#1a4a2e">
    </a-plane>
    <a-text value="MODUL 1: SEBELUM MENINGGAL"
            position="0 0.03 0.85" rotation="-90 0 0"
            color="#FFD700" width="4.5" align="center"
            font="mozillavr">
    </a-text>

    <!-- Kandungan BESAR & JELAS -->
    <a-text value="HUKUM: SUNAT mengingati kematian"
            position="0 0.03 0.5" rotation="-90 0 0"
            color="#00FF88" width="4.0" align="center"
            font="mozillavr">
    </a-text>

    <a-text value="8 TANDA KEMATIAN:"
            position="-0.5 0.03 0.2" rotation="-90 0 0"
            color="#FFD700" width="3.5" align="left"
            font="mozillavr">
    </a-text>
    <a-text value="1. Tapak kaki lurus
2. Hidung jatuh/pucat
3. Sendi renggang
4. Lidah kelu
5. Tak kenal keluarga
6. Terlalu dahaga
7. Tiada timbal balik nafas
8. Perubahan tabiat"
            position="-0.5 0.03 -0.1" rotation="-90 0 0"
            color="white" width="3.5" align="left"
            font="mozillavr">
    </a-text>

    <a-text value="SUNAT PESAKIT NAZAK:"
            position="0.8 0.03 0.2" rotation="-90 0 0"
            color="#FFD700" width="3.0" align="left"
            font="mozillavr">
    </a-text>
    <a-text value="✓ Ajar Lailahaillallah
✓ Baca Surah Yasin
✓ Titiskan air ke bibir"
            position="0.8 0.03 -0.05" rotation="-90 0 0"
            color="white" width="3.0" align="left"
            font="mozillavr">
    </a-text>

    <!-- Footer ayat -->
    <a-plane position="0 0.02 -0.85" rotation="-90 0 0"
             width="2.8" height="0.28" color="#1a3320">
    </a-plane>
    <a-text value="'Tiap-tiap yang bernyawa akan merasai mati' — Ali Imran:185"
            position="0 0.03 -0.85" rotation="-90 0 0"
            color="#90EE90" width="4.2" align="center"
            font="mozillavr">
    </a-text>

    <!-- Bola animasi -->
    <a-sphere position="0 0.8 0" radius="0.06" color="#FFD700">
      <a-animation attribute="position" from="0 0.5 0" to="0 1.1 0"
                   direction="alternate" dur="2000" repeat="indefinite">
      </a-animation>
    </a-sphere>

  </a-marker>

  <!-- ═══════════════════════════════════════
  MODUL 2A — KANJI MARKER
  Memandikan Jenazah
  ═══════════════════════════════════════ -->
  <a-marker preset="kanji">

    <a-plane position="0 0.01 0" rotation="-90 0 0"
             width="2.8" height="2.4" color="#001020" opacity="0.97">
    </a-plane>

    <a-plane position="0 0.02 0.95" rotation="-90 0 0"
             width="2.8" height="0.35" color="#003366">
    </a-plane>
    <a-text value="MODUL 2A: MEMANDIKAN JENAZAH"
            position="0 0.03 0.95" rotation="-90 0 0"
            color="#87CEEB" width="4.5" align="center"
            font="mozillavr">
    </a-text>

    <a-text value="9 LANGKAH MEMANDIKAN:"
            position="0 0.03 0.62" rotation="-90 0 0"
            color="#FFD700" width="4.0" align="center"
            font="mozillavr">
    </a-text>

    <a-text value="1. Bersihkan anggota badan
2. Istinja qubul dan dubur
3. Bersugi dan bersuci
4. Mandikan bahagian hadapan
5. Mandikan bahagian belakang
6. Wudukkan anggota wuduk"
            position="-0.4 0.03 0.15" rotation="-90 0 0"
            color="white" width="3.5" align="left"
            font="mozillavr">
    </a-text>

    <a-text value="7. Mandian akhir: Air mutlak
8. Mandian akhir: Air daun bidara
9. Mandian akhir: Air kapur barus

Bilangan: Ganjil (3x, 5x, 7x)"
            position="-0.4 0.03 -0.35" rotation="-90 0 0"
            color="#87CEEB" width="3.5" align="left"
            font="mozillavr">
    </a-text>

    <a-plane position="0 0.02 -0.9" rotation="-90 0 0"
             width="2.8" height="0.28" color="#660000">
    </a-plane>
    <a-text value="PENTING: Lelaki mandikan lelaki | Perempuan mandikan perempuan"
            position="0 0.03 -0.9" rotation="-90 0 0"
            color="#FFD700" width="4.2" align="center"
            font="mozillavr">
    </a-text>

    <!-- Water drops -->
    <a-sphere position="-0.3 0.6 0.8" radius="0.05" color="#4169E1">
      <a-animation attribute="position" from="-0.3 0.8 0.8" to="-0.3 0.1 0.8"
                   dur="1000" repeat="indefinite" easing="easeInQuad">
      </a-animation>
    </a-sphere>
    <a-sphere position="0.3 0.6 0.8" radius="0.05" color="#6495ED">
      <a-animation attribute="position" from="0.3 0.8 0.8" to="0.3 0.1 0.8"
                   dur="1300" repeat="indefinite" easing="easeInQuad">
      </a-animation>
    </a-sphere>

  </a-marker>

  <!-- ═══════════════════════════════════════
  MODUL 2B — BARCODE 0
  Mengkafankan Jenazah
  ═══════════════════════════════════════ -->
  <a-marker type="barcode" value="0">

    <a-plane position="0 0.01 0" rotation="-90 0 0"
             width="2.8" height="2.2" color="#0d0020" opacity="0.97">
    </a-plane>

    <a-plane position="0 0.02 0.85" rotation="-90 0 0"
             width="2.8" height="0.35" color="#330066">
    </a-plane>
    <a-text value="MODUL 2B: MENGKAFANKAN"
            position="0 0.03 0.85" rotation="-90 0 0"
            color="#FFB6C1" width="4.5" align="center"
            font="mozillavr">
    </a-text>

    <a-text value="KAFAN LELAKI (3 helai):"
            position="-0.5 0.03 0.5" rotation="-90 0 0"
            color="#FFD700" width="3.5" align="left"
            font="mozillavr">
    </a-text>
    <a-text value="• 2 helai kain kafan
• 1 helai baju
• Balut kanan dahulu
• Ikat 3 simpulan"
            position="-0.5 0.03 0.18" rotation="-90 0 0"
            color="white" width="3.5" align="left"
            font="mozillavr">
    </a-text>

    <a-text value="KAFAN PEREMPUAN (5 helai):"
            position="0.7 0.03 0.5" rotation="-90 0 0"
            color="#FFD700" width="3.0" align="left"
            font="mozillavr">
    </a-text>
    <a-text value="• 3 helai kain kafan
• 1 helai baju
• 1 set telekung
• Rambut ke hadapan"
            position="0.7 0.03 0.18" rotation="-90 0 0"
            color="white" width="3.0" align="left"
            font="mozillavr">
    </a-text>

    <a-text value="Alatan: Kain Putih 60 inci, Kapas, Kapur Barus, Air Mawar, Minyak Atar"
            position="0 0.03 -0.5" rotation="-90 0 0"
            color="#90EE90" width="4.2" align="center"
            font="mozillavr">
    </a-text>

    <a-plane position="0 0.02 -0.85" rotation="-90 0 0"
             width="2.8" height="0.28" color="#1a0033">
    </a-plane>
    <a-text value="Hadith: Kafankan dengan kain putih — sebaik-baik pakaian"
            position="0 0.03 -0.85" rotation="-90 0 0"
            color="#FFD700" width="4.2" align="center"
            font="mozillavr">
    </a-text>

  </a-marker>

  <!-- ═══════════════════════════════════════
  MODUL 2C — BARCODE 1
  Menyolatkan Jenazah
  ═══════════════════════════════════════ -->
  <a-marker type="barcode" value="1">

    <a-plane position="0 0.01 0" rotation="-90 0 0"
             width="2.8" height="2.4" color="#00000f" opacity="0.97">
    </a-plane>

    <a-plane position="0 0.02 0.95" rotation="-90 0 0"
             width="2.8" height="0.35" color="#000066">
    </a-plane>
    <a-text value="MODUL 2C: SOLAT JENAZAH"
            position="0 0.03 0.95" rotation="-90 0 0"
            color="#87CEEB" width="4.5" align="center"
            font="mozillavr">
    </a-text>

    <a-text value="4 TAKBIR:"
            position="0 0.03 0.62" rotation="-90 0 0"
            color="#FFD700" width="4.0" align="center"
            font="mozillavr">
    </a-text>

    <a-text value="TAKBIR 1: Niat + Al-Fatihah

TAKBIR 2: Selawat Ibrahim

TAKBIR 3: Doa untuk jenazah
  Lelaki: Allahummaghfirlahu...
  Perempuan: Allahummaghfirlaha...

TAKBIR 4: Doa umum + Salam"
            position="0 0.03 0.1" rotation="-90 0 0"
            color="white" width="4.2" align="left"
            font="mozillavr">
    </a-text>

    <a-plane position="0 0.02 -0.75" rotation="-90 0 0"
             width="2.8" height="0.42" color="#1a1a00">
    </a-plane>
    <a-text value="Imam: Setentang KEPALA (lelaki) | Setentang PINGGANG (perempuan)
Tiada rukuk, sujud, azan, iqamah"
            position="0 0.03 -0.75" rotation="-90 0 0"
            color="#FFD700" width="4.2" align="center"
            font="mozillavr">
    </a-text>

  </a-marker>

  <!-- ═══════════════════════════════════════
  MODUL 2D — BARCODE 2
  Mengebumikan Jenazah
  ═══════════════════════════════════════ -->
  <a-marker type="barcode" value="2">

    <a-plane position="0 0.01 0" rotation="-90 0 0"
             width="2.8" height="2.4" color="#050d00" opacity="0.97">
    </a-plane>

    <a-plane position="0 0.02 0.95" rotation="-90 0 0"
             width="2.8" height="0.35" color="#1a3300">
    </a-plane>
    <a-text value="MODUL 2D: MENGEBUMIKAN"
            position="0 0.03 0.95" rotation="-90 0 0"
            color="#90EE90" width="4.5" align="center"
            font="mozillavr">
    </a-text>

    <a-text value="Ukuran kubur: Dalam 7 KAKI | Lebar 3 KAKI
Jenis: LAHAD (sisi) lebih afdhal"
            position="0 0.03 0.6" rotation="-90 0 0"
            color="#FFD700" width="4.2" align="center"
            font="mozillavr">
    </a-text>

    <a-text value="5 TATACARA PENGEBUMIAN:

1. Letak jenazah dalam lahad
   Lambung kanan — hadap Kiblat

2. Turunkan dengan cermat & lembut

3. Sandar dengan tanah — jangan terbalik

4. Tutup liang lahad

5. Timbuskan tanah perlahan-lahan"
            position="0 0.03 0.1" rotation="-90 0 0"
            color="white" width="4.2" align="left"
            font="mozillavr">
    </a-text>

    <a-plane position="0 0.02 -0.82" rotation="-90 0 0"
             width="2.8" height="0.42" color="#001a00">
    </a-plane>
    <a-text value="Doa: 'Bismillahi wa ala millati Rasulillah'
Malaysia: Kepala ke UTARA | Muka ke BARAT LAUT (Kiblat)"
            position="0 0.03 -0.82" rotation="-90 0 0"
            color="#90EE90" width="4.2" align="center"
            font="mozillavr">
    </a-text>

  </a-marker>

  <!-- ═══════════════════════════════════════
  MODUL 3 — BARCODE 3
  Pengajaran & Hikmah
  ═══════════════════════════════════════ -->
  <a-marker type="barcode" value="3">

    <a-plane position="0 0.01 0" rotation="-90 0 0"
             width="2.8" height="2.2" color="#100800" opacity="0.97">
    </a-plane>

    <a-plane position="0 0.02 0.85" rotation="-90 0 0"
             width="2.8" height="0.35" color="#4a2000">
    </a-plane>
    <a-text value="MODUL 3: PENGAJARAN & HIKMAH"
            position="0 0.03 0.85" rotation="-90 0 0"
            color="#FFA500" width="4.5" align="center"
            font="mozillavr">
    </a-text>

    <a-text value="3 AMALAN TIDAK PUTUS SELEPAS MATI:"
            position="0 0.03 0.5" rotation="-90 0 0"
            color="#FFD700" width="4.2" align="center"
            font="mozillavr">
    </a-text>

    <a-text value="🌿 SEDEKAH JARIAH
   Amalan yang manfaatnya berterusan

📚 ILMU YANG BERMANFAAT
   Ilmu yang diajar dan diamalkan orang lain

🤲 DOA ANAK YANG SOLEH
   Doa anak untuk ibu bapa"
            position="0 0.03 0.05" rotation="-90 0 0"
            color="white" width="4.2" align="left"
            font="mozillavr">
    </a-text>

    <a-plane position="0 0.02 -0.78" rotation="-90 0 0"
             width="2.8" height="0.35" color="#2a1500">
    </a-plane>
    <a-text value="'Perbanyakkan mengingati pemutus kelazatan — kematian' (HR Tirmidzi)"
            position="0 0.03 -0.78" rotation="-90 0 0"
            color="#FFD700" width="4.2" align="center"
            font="mozillavr">
    </a-text>

    <a-sphere position="-0.9 0.7 0" radius="0.07" color="#FFD700">
      <a-animation attribute="position" from="-0.9 0.4 0" to="-0.9 1.0 0"
                   direction="alternate" dur="2500" repeat="indefinite">
      </a-animation>
    </a-sphere>
    <a-sphere position="0.9 0.7 0" radius="0.07" color="#FFA500">
      <a-animation attribute="position" from="0.9 1.0 0" to="0.9 0.4 0"
                   direction="alternate" dur="3000" repeat="indefinite">
      </a-animation>
    </a-sphere>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<!-- UI BAWAH -->
<div id="ui">
  <div id="mod-info">🎯 Pilih modul → Scan marker yang sesuai</div>
  <div id="tabs">
    <button class="tab on"  onclick="setMod(0)">1️⃣ Sblm Meninggal</button>
    <button class="tab" onclick="setMod(1)">💧 2A. Memandikan</button>
    <button class="tab" onclick="setMod(2)">🕊️ 2B. Kafan</button>
    <button class="tab" onclick="setMod(3)">🤲 2C. Solat</button>
    <button class="tab" onclick="setMod(4)">⚰️ 2D. Kebumikan</button>
    <button class="tab" onclick="setMod(5)">✨ 3. Hikmah</button>
  </div>
</div>

<script>
const mods = [
  { name:"Modul 1: Sebelum Meninggal", marker:"Scan marker HIRO" },
  { name:"Modul 2A: Memandikan Jenazah", marker:"Scan marker KANJI" },
  { name:"Modul 2B: Mengkafankan Jenazah", marker:"Scan BARCODE nombor 0" },
  { name:"Modul 2C: Solat Jenazah", marker:"Scan BARCODE nombor 1" },
  { name:"Modul 2D: Mengebumikan Jenazah", marker:"Scan BARCODE nombor 2" },
  { name:"Modul 3: Hikmah", marker:"Scan BARCODE nombor 3" }
];

function setMod(i) {
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('on', i===j));
  document.getElementById('mod-info').innerHTML =
    `📖 <b>${mods[i].name}</b><br>🎯 ${mods[i].marker}`;
}

document.querySelectorAll('a-marker').forEach((m, i) => {
  m.addEventListener('markerFound', () => {
    const h = document.getElementById('hint');
    h.textContent = '✅ Marker dikesan! Terokai kandungan AR';
    h.classList.add('found');
    setMod(i);
  });
  m.addEventListener('markerLost', () => {
    const h = document.getElementById('hint');
    h.textContent = '📸 Arahkan kamera ke marker';
    h.classList.remove('found');
  });
});

setMod(0);
</script>
</body>
</html>
